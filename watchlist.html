<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watchlist</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    if (localStorage.getItem("darkMode") === "dark") {
      document.documentElement.setAttribute("data-theme", "dark");
    }
  </script>
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">
        <div class="logo-icon">&#x1F3AC;</div>
        Movie Tracker
      </a>
      <nav>
        <a href="index.html"           class="nav-link">&#x1F3E0; Home</a>
        <a href="recommendations.html" class="nav-link">&#x1F3AC; Discover</a>
        <a href="watchlist.html"       class="nav-link" id="nav-wl">&#x1F4CB; Watchlist</a>
        <a href="history.html"         class="nav-link">&#x1F550; History</a>
      </nav>
      <button class="dark-toggle" id="dark-btn" onclick="toggleDarkMode()" title="Toggle dark mode">&#x1F319;</button>
    </div>
  </header>

  <!-- ── Main ── -->
  <main>

    <div class="page-header">
      <h1>Your Watchlist</h1>
      <p>Hover a card: &#x2713; moves it to history, &#x2715; removes it from the list.</p>
    </div>

    <div class="movie-grid movie-grid-wide" id="wl-grid"></div>

  </main>

  <!-- ── Footer ── -->
  <footer>
    <p>Your personal cinema journal.</p>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    document.getElementById("nav-wl").classList.add("active");

    function renderWatchlistPage() {
      const state = getState();
      renderGrid(state.watchlist, "wl-grid", true, true, false);
    }

    window.renderCurrentPage = renderWatchlistPage;
    renderWatchlistPage();
  </script>

</body>
</html>
